name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22.14'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm run zip:linux

      - uses: actions/upload-artifact@v4
        with:
          name: c3addon
          path: Genvidtech_GCoreVideoPlugin.c3addon
