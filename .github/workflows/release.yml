name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm run zip:linux

      - run: gh release create "$GITHUB_REF_NAME" Genvidtech_GCoreVideoPlugin.c3addon --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
